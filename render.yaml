services:
  - type: web
    name: brandpilot-mcp-gateway
    runtime: docker
    dockerfilePath: ./gateway/Dockerfile
    dockerContext: .
    region: frankfurt
    plan: starter          # $7/mo — always-on, no cold starts
    healthCheckPath: /health
    envVars:
      # Public URL of this service — set after first deploy
      - key: GATEWAY_URL
        value: https://brandpilot-mcp-gateway.onrender.com

      # Cognito — from AWS Cognito app client (set in Render dashboard)
      - key: COGNITO_DOMAIN_STG
        value: https://brandpilot-stg-api-domain.auth.eu-central-1.amazoncognito.com
      - key: COGNITO_CLIENT_ID
        sync: false
      - key: COGNITO_CLIENT_SECRET
        sync: false

      # BrandPilot backend
      - key: BRANDPILOT_API_STG
        value: https://brandpilot-stg.com/api
      - key: BRANDPILOT_ACCOUNT_IDS
        value: 01KPTNF3WKJ2ASYZA4J6E2V8NS
      - key: BRANDPILOT_ENV
        value: staging

      # Web search
      - key: TAVILY_API_KEY
        sync: false

      # LangSmith — tracing for all MCP tool calls
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_TRACING
        value: "true"
      - key: LANGSMITH_ENDPOINT
        value: https://eu.api.smith.langchain.com
      - key: LANGSMITH_PROJECT
        value: brandpilot
